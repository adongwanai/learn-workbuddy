<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#202124"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#7b1fa2"/>
    </marker>
  </defs>
  <rect width="800" height="500" fill="#f8f9fa"/>

  <text x="400" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#202124">Sidecar Server 架构</text>

  <!-- Electron Main -->
  <rect x="30" y="60" width="170" height="55" rx="8" fill="#1a73e8"/>
  <text x="115" y="85" text-anchor="middle" font-size="14" fill="white" font-weight="bold">Electron Main</text>
  <text x="115" y="103" text-anchor="middle" font-size="11" fill="#e8f0fe">主进程入口</text>

  <!-- spawns arrow -->
  <line x1="200" y1="87" x2="245" y2="87" stroke="#7b1fa2" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <text x="222" y="80" text-anchor="middle" font-size="10" fill="#7b1fa2">spawns</text>

  <!-- Sidecar -->
  <rect x="250" y="55" width="200" height="70" rx="8" fill="#7b1fa2"/>
  <text x="350" y="80" text-anchor="middle" font-size="15" fill="white" font-weight="bold">Sidecar (Node.js)</text>
  <text x="350" y="98" text-anchor="middle" font-size="11" fill="#e8e0f0">独立子进程</text>
  <text x="350" y="115" text-anchor="middle" font-size="11" fill="#e8e0f0">JSON-RPC Server</text>

  <!-- Unix Socket -->
  <line x1="450" y1="90" x2="495" y2="90" stroke="#202124" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="500" y="70" width="120" height="45" rx="6" fill="#fbbc04"/>
  <text x="560" y="90" text-anchor="middle" font-size="12" fill="#202124" font-weight="bold">Unix Socket</text>
  <text x="560" y="107" text-anchor="middle" font-size="10" fill="#202124">.workbuddy/sock</text>

  <!-- CLI Sessions -->
  <line x1="560" y1="115" x2="560" y2="150" stroke="#202124" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="430" y="155" width="340" height="50" rx="8" fill="#34a853" opacity="0.9"/>
  <text x="600" y="178" text-anchor="middle" font-size="14" fill="white" font-weight="bold">CLI 会话管理 (PTY / Pipe)</text>
  <text x="600" y="195" text-anchor="middle" font-size="11" fill="white">Session A · Session B · Session C · ...</text>

  <!-- RingBuffer -->
  <text x="400" y="240" text-anchor="middle" font-size="16" fill="#202124" font-weight="bold">RingBuffer（固定大小循环缓冲区）</text>

  <!-- RingBuffer visualization -->
  <circle cx="400" cy="350" r="90" fill="none" stroke="#1a73e8" stroke-width="3" stroke-dasharray="10,5"/>
  <circle cx="400" cy="350" r="90" fill="none" stroke="#e8f0fe" stroke-width="20" opacity="0.5"/>

  <!-- Buffer segments -->
  <circle cx="400" cy="260" r="10" fill="#34a853"/>
  <text x="400" y="245" text-anchor="middle" font-size="10" fill="#202124">写入点</text>

  <circle cx="486" cy="315" r="10" fill="#fbbc04"/>
  <text x="515" y="318" font-size="10" fill="#202124">读取点</text>

  <circle cx="490" cy="390" r="8" fill="#1a73e8"/>
  <circle cx="420" cy="435" r="8" fill="#1a73e8"/>
  <circle cx="330" cy="415" r="8" fill="#1a73e8"/>
  <circle cx="305" cy="340" r="8" fill="#1a73e8"/>
  <circle cx="350" cy="275" r="8" fill="#1a73e8"/>

  <!-- Center text -->
  <text x="400" y="345" text-anchor="middle" font-size="28" fill="#1a73e8" font-weight="bold">bounded</text>
  <text x="400" y="365" text-anchor="middle" font-size="12" fill="#202124">环形覆盖写入</text>

  <!-- Labels -->
  <text x="80" y="270" font-size="12" fill="#202124">特性:</text>
  <text x="80" y="290" font-size="11" fill="#202124">· 固定大小, 不溢出</text>
  <text x="80" y="308" font-size="11" fill="#202124">· 新数据覆盖旧数据</text>
  <text x="80" y="326" font-size="11" fill="#202124">· O(1) 读写复杂度</text>
  <text x="80" y="344" font-size="11" fill="#202124">· 适合日志流缓冲</text>
  <text x="80" y="362" font-size="11" fill="#202124">· 进程崩溃后可恢复</text>

  <!-- Flow labels -->
  <text x="700" y="240" font-size="12" fill="#202124" font-weight="bold">数据流:</text>
  <text x="700" y="258" font-size="11" fill="#202124">CLI stdout</text>
  <text x="700" y="273" font-size="11" fill="#202124">→ RingBuffer</text>
  <text x="700" y="288" font-size="11" fill="#202124">→ Socket</text>
  <text x="700" y="303" font-size="11" fill="#202124">→ Renderer</text>
</svg>
