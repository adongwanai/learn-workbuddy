<svg viewBox="0 0 680 620" width="100%" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>WorkBuddy 进程架构图</title>
  <desc>展示 Electron 主进程、Sidecar 服务、CLI 会话、SQLite 数据库和 MCP 连接器之间的架构关系</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .t{font:500 14px var(--font-sans,sans-serif);fill:var(--color-text-primary,#000)}
      .th{font:500 14px var(--font-sans,sans-serif);fill:var(--color-text-primary,#000)}
      .ts{font:400 12px var(--font-sans,sans-serif);fill:var(--color-text-secondary,#666)}
      .tc{font:400 11px var(--font-mono,monospace);fill:var(--color-text-tertiary,#999)}
    </style>
  </defs>

  <rect x="20" y="20" width="640" height="580" rx="20" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.5"/>
  <text class="th" x="40" y="48" font-size="15">Electron 主进程</text>
  <text class="ts" x="40" y="66">桌面窗口、系统集成、IPC 与进程生命周期</text>

  <g class="c-purple">
    <rect x="40" y="85" width="180" height="56" rx="8" fill="#CECBF6" stroke="#7F77DD" stroke-width="0.5"/>
    <text class="th" x="130" y="108" text-anchor="middle" dominant-baseline="central">Renderer 进程</text>
    <text class="ts" x="130" y="126" text-anchor="middle" dominant-baseline="central">React UI / Vite 构建</text>
  </g>

  <g class="c-blue">
    <rect x="250" y="85" width="180" height="56" rx="8" fill="#B5D4F4" stroke="#378ADD" stroke-width="0.5"/>
    <text class="th" x="340" y="108" text-anchor="middle" dominant-baseline="central">Preload 桥接</text>
    <text class="ts" x="340" y="126" text-anchor="middle" dominant-baseline="central">contextBridge / IPC</text>
  </g>

  <g class="c-gray">
    <rect x="460" y="85" width="180" height="56" rx="8" fill="#D3D1C7" stroke="#888780" stroke-width="0.5"/>
    <text class="th" x="550" y="108" text-anchor="middle" dominant-baseline="central">SQLite 数据库</text>
    <text class="ts" x="550" y="126" text-anchor="middle" dominant-baseline="central">better-sqlite3 / WAL</text>
  </g>

  <path d="M220 113 L250 113" class="arr" stroke="#5F5E5A" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M430 113 L460 113" class="arr" stroke="#5F5E5A" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <text class="ts" x="340" y="165" text-anchor="middle">多组 RPC 领域通道 (JSON-RPC 双向通信)</text>

  <rect x="40" y="180" width="600" height="200" rx="12" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
  <text class="th" x="60" y="205" font-size="14">Sidecar 服务进程</text>
  <text class="ts" x="60" y="222">独立子进程 · JSON-RPC over Unix Socket / Named Pipe · 空闲 30 分钟自动退出</text>

  <g class="c-teal">
    <rect x="60" y="240" width="160" height="52" rx="8" fill="#9FE1CB" stroke="#1D9E75" stroke-width="0.5"/>
    <text class="th" x="140" y="260" text-anchor="middle" dominant-baseline="central">RingBuffer</text>
    <text class="ts" x="140" y="278" text-anchor="middle" dominant-baseline="central">有界环形缓冲区</text>
  </g>

  <g class="c-teal">
    <rect x="250" y="240" width="160" height="52" rx="8" fill="#9FE1CB" stroke="#1D9E75" stroke-width="0.5"/>
    <text class="th" x="330" y="260" text-anchor="middle" dominant-baseline="central">SessionProcess</text>
    <text class="ts" x="330" y="278" text-anchor="middle" dominant-baseline="central">PTY (macOS/Linux)</text>
  </g>

  <g class="c-teal">
    <rect x="440" y="240" width="160" height="52" rx="8" fill="#9FE1CB" stroke="#1D9E75" stroke-width="0.5"/>
    <text class="th" x="520" y="260" text-anchor="middle" dominant-baseline="central">Control Socket</text>
    <text class="ts" x="520" y="278" text-anchor="middle" dominant-baseline="central">control socket</text>
  </g>

  <g class="c-amber">
    <rect x="60" y="310" width="540" height="52" rx="8" fill="#FAEEDA" stroke="#EF9F27" stroke-width="0.5"/>
    <text class="th" x="330" y="330" text-anchor="middle" dominant-baseline="central">CLI 会话 (cbc / agent-cli --serve --port)</text>
    <text class="ts" x="330" y="348" text-anchor="middle" dominant-baseline="central">每会话独立 PTY 子进程 · ACP HTTP 端点 127.0.0.1:port/api/v1/acp</text>
  </g>

  <path d="M340 224 L340 240" class="arr" stroke="#0F6E56" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <rect x="40" y="400" width="290" height="180" rx="12" fill="#FAECE7" stroke="#F0997B" stroke-width="0.5"/>
  <text class="th" x="60" y="425">MCP 连接器系统</text>
  <text class="ts" x="60" y="442">多类外部服务 · streamableHttp / stdio</text>
  <g class="c-coral">
    <rect x="60" y="460" width="120" height="44" rx="8" fill="#F5C4B3" stroke="#D85A30" stroke-width="0.5"/>
    <text class="th" x="120" y="482" text-anchor="middle" dominant-baseline="central">腾讯文档</text>
  </g>
  <g class="c-coral">
    <rect x="195" y="460" width="120" height="44" rx="8" fill="#F5C4B3" stroke="#D85A30" stroke-width="0.5"/>
    <text class="th" x="255" y="482" text-anchor="middle" dominant-baseline="central">飞书 / 钉钉</text>
  </g>
  <g class="c-coral">
    <rect x="60" y="515" width="120" height="44" rx="8" fill="#F5C4B3" stroke="#D85A30" stroke-width="0.5"/>
    <text class="th" x="120" y="537" text-anchor="middle" dominant-baseline="central">GitHub</text>
  </g>
  <g class="c-coral">
    <rect x="195" y="515" width="120" height="44" rx="8" fill="#F5C4B3" stroke="#D85A30" stroke-width="0.5"/>
    <text class="th" x="255" y="537" text-anchor="middle" dominant-baseline="central">企业微信</text>
  </g>

  <rect x="350" y="400" width="290" height="180" rx="12" fill="#FBEAF0" stroke="#ED93B1" stroke-width="0.5"/>
  <text class="th" x="370" y="425">安全与审计</text>
  <text class="ts" x="370" y="442">沙盒执行 · 哈希链审计日志</text>
  <g class="c-pink">
    <rect x="370" y="460" width="120" height="44" rx="8" fill="#F4C0D1" stroke="#D4537E" stroke-width="0.5"/>
    <text class="th" x="430" y="482" text-anchor="middle" dominant-baseline="central">命令沙盒</text>
  </g>
  <g class="c-pink">
    <rect x="505" y="460" width="120" height="44" rx="8" fill="#F4C0D1" stroke="#D4537E" stroke-width="0.5"/>
    <text class="th" x="565" y="482" text-anchor="middle" dominant-baseline="central">权限拦截</text>
  </g>
  <g class="c-pink">
    <rect x="370" y="515" width="255" height="44" rx="8" fill="#F4C0D1" stroke="#D4537E" stroke-width="0.5"/>
    <text class="th" x="497" y="537" text-anchor="middle" dominant-baseline="central">审计日志 (JSONL · SHA256 链)</text>
  </g>

  <path d="M340 380 L185 400" class="arr" stroke="#993C1D" stroke-width="1" fill="none" marker-end="url(#arrow)" stroke-dasharray="4 3"/>
  <path d="M340 380 L495 400" class="arr" stroke="#993556" stroke-width="1" fill="none" marker-end="url(#arrow)" stroke-dasharray="4 3"/>
</svg>
